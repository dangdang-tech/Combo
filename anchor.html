<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agora · 锚定你的能力</title>
<style>
:root{--ink:#241f1b;--ink60:#6b6258;--ink40:#9b9389;--line:#e7e2da;--bg:#f7f4ef;--card:#fff;--raised:#fbf9f5;--muted:#f1ede6;
--rust:#a73718;--green:#3a7a4e;--blue:#3b6ea5;--warn:#b8863b;--err:#b4503f;
--iris:#6e56cf;--sea:#3b8a9a;--gold:#b8863b;--rose:#b5567a;--moss:#5a8a3c}
*{box-sizing:border-box;margin:0;padding:0}
body{font:15px/1.6 -apple-system,"PingFang SC",sans-serif;color:var(--ink);background:var(--bg)}
.top{background:var(--card);border-bottom:1px solid var(--line);padding:12px 22px;display:flex;align-items:center;gap:10px}
.top .br{font:600 17px Georgia,"Songti SC",serif;color:var(--rust)}
.top .sl{color:var(--ink40)}.top .pg{font-weight:600}
.top .sp{flex:1}
.top .sv{font-size:12px;border:1px solid var(--line);border-radius:7px;padding:5px 11px;color:var(--ink60);background:none;cursor:pointer}
.top .av{width:28px;height:28px;border-radius:50%;background:var(--rust);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px}
.steps{background:var(--card);border-bottom:1px solid var(--line);padding:11px 22px;display:flex;align-items:center;gap:8px;justify-content:center;font-size:13px}
.stp{display:flex;align-items:center;gap:7px;color:var(--ink40)}
.stp .n{width:22px;height:22px;border-radius:50%;background:var(--muted);color:var(--ink40);display:flex;align-items:center;justify-content:center;font-size:12px;flex:none}
.stp.done .n{background:var(--green);color:#fff}.stp.done{color:var(--ink60)}
.stp.act .n{background:var(--rust);color:#fff}.stp.act{color:var(--ink);font-weight:600}
.stp .ln{width:34px;height:1px;background:var(--line)}
.wrap{max-width:880px;margin:0 auto;padding:28px 22px 130px}
.eyebrow{font:11px/1 ui-monospace,monospace;letter-spacing:.12em;color:var(--rust);text-transform:uppercase;margin-bottom:10px}
h1{font:600 26px/1.25 Georgia,"Songti SC",serif;margin-bottom:6px}
.lede{color:var(--ink60);margin-bottom:20px}
.bar{display:flex;gap:14px;align-items:center;font-size:13px;color:var(--ink60);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:18px}
.bar b{color:var(--ink)}
.sec{font:11px/1 ui-monospace,monospace;letter-spacing:.1em;color:var(--ink40);text-transform:uppercase;margin:22px 0 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;transition:.15s}
.card.on{border-color:var(--rust);box-shadow:0 0 0 1px var(--rust)}
.crow{display:flex;align-items:flex-start;gap:12px}
.ck{width:20px;height:20px;border:1.5px solid var(--ink40);border-radius:6px;flex:none;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.ck.on{background:var(--rust);border-color:var(--rust)}
.dot{width:30px;height:30px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:600}
.cmain{flex:1;min-width:0}
.cname{font-weight:600;font-size:16px;border:none;background:none;color:var(--ink);width:100%;padding:1px 0}
.cname:focus{outline:none;border-bottom:1px dashed var(--rust)}
.cintent{color:var(--ink60);font-size:13px;margin-top:1px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.b{font:11px/1 ui-monospace,monospace;padding:3px 7px;border-radius:5px;background:var(--muted);color:var(--ink60)}
.b.high{background:#e7f0ea;color:var(--green)}.b.med{background:#f3eede;color:var(--warn)}.b.low{background:var(--muted);color:var(--ink40)}
.b.warn{background:#f7e9e5;color:var(--err)}.b.ok{background:#e7f0ea;color:var(--green)}
.scope{font-size:12px;color:var(--ink60);margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.chip{background:#eef1f5;color:var(--blue);padding:2px 7px;border-radius:5px;font-size:11px}
.ev{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px;display:none}.ev.show{display:block}
.evrow{display:flex;gap:10px;font-size:12px;color:var(--ink60);padding:3px 0}
.evrow .d{font-family:ui-monospace,monospace;color:var(--ink40);flex:none}
.evrow .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{font:9px/1 ui-monospace,monospace;padding:2px 5px;border-radius:4px;color:#fff;flex:none}
.acts{display:flex;gap:12px;margin-top:9px;font-size:12px}
.acts a{color:var(--ink40);cursor:pointer}.acts a:hover{color:var(--ink)}
.foot{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);border-top:1px solid var(--line);padding:14px 22px;backdrop-filter:blur(6px)}
.foot .in{max-width:880px;margin:0 auto;display:flex;align-items:center;gap:14px}
.foot .s{color:var(--ink60);font-size:13px;flex:1}
.btn{background:var(--rust);color:#fff;border:none;border-radius:9px;padding:11px 22px;font-size:14px;font-weight:500;cursor:pointer}
.btn:disabled{opacity:.4;cursor:default}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--ink60)}
.spin{text-align:center;color:var(--ink60);padding:60px 0}
.dots i{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--rust);margin:0 2px;animation:b 1.2s infinite}
.dots i:nth-child(2){animation-delay:.2s}.dots i:nth-child(3){animation-delay:.4s}
@keyframes b{0%,100%{opacity:.3}50%{opacity:1}}
.addbtn{border:1px dashed var(--line);border-radius:10px;padding:11px;text-align:center;color:var(--ink40);cursor:pointer;font-size:13px}
.addbtn:hover{border-color:var(--rust);color:var(--rust)}
/* panel */
.banner{background:#eef3f8;border:1px solid #d5e2ee;border-radius:10px;padding:11px 14px;margin-bottom:16px;font-size:13px;color:var(--blue)}
.banner b{color:var(--ink)}
.pcard{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:11px}
.pcard .cta{flex:none}
/* pkg */
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.plabel{font:11px/1 ui-monospace,monospace;letter-spacing:.08em;color:var(--rust);margin-bottom:12px}
.plabel .muted{color:var(--ink40);letter-spacing:0}
.q{background:var(--raised);border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-bottom:9px}
.q .qt{font-weight:600;font-size:14px}.q .qh{font-size:12px;color:var(--ink40);margin-top:3px}
.q .qm{display:flex;gap:6px;align-items:center;margin-top:5px}
.kbd{font:10px/1 ui-monospace,monospace;color:var(--ink40)}
.cols{display:flex;gap:12px}.col{flex:1;border-radius:9px;padding:12px 13px}
.col.ok{background:#eef5f0;border:1px solid #d3e6da}.col.no{background:#f7ece9;border:1px solid #ecd6cf}
.col h4{font-size:13px;margin-bottom:8px}.col.ok h4{color:var(--green)}.col.no h4{color:var(--err)}
.col li{list-style:none;font-size:13px;color:var(--ink60);padding:2px 0}
.done{text-align:center;padding:40px 0}.done h2{font:600 22px Georgia,serif;margin-bottom:8px}
.link{font-family:ui-monospace,monospace;background:var(--muted);padding:10px 14px;border-radius:8px;display:inline-block;margin-top:12px}
</style></head>
<body><div id="app"><div class="spin" style="padding-top:120px"><div>正在生成草稿<span class="dots"><i></i><i></i><i></i></span></div><div style="font-size:12px;color:var(--ink40);margin-top:8px">Pi 在精读历史、归纳能力、算适用范围(首次约 2-4 分钟)</div></div></div>

<script>
const SRC={claude:"#C96442",codex:"#10a37f",opencode:"#6e56cf",hermes:"#b8863b"};
const CATS=["#6e56cf","#3b8a9a","#b8863b","#b5567a","#5a8a3c"];
const qs=new URLSearchParams(location.search); const ID=qs.get("id");
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const api=async(p,b,ms=300000)=>{const ctl=new AbortController();const t=setTimeout(()=>ctl.abort(),ms);try{const r=await fetch(p,{signal:ctl.signal,...(b?{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}:{})});return await r.json()}catch(e){return{error:e.name==="AbortError"?"超时":e.message}}finally{clearTimeout(t)}};
let S={view:"anchor",cands:[],sel:new Set(),names:{},open:new Set(),metrics:null,anchors:[],pkg:null};

function shell(body){
  const v=S.view; const st=(k,label,idx)=>{const order=["anchor","panel","pkg","published"];const cur=order.indexOf(v);const mine=["anchor","panel","pkg","published"].indexOf(k);
    let cls=mine<cur?"done":mine===cur?"act":"";return `<div class="stp ${cls}"><span class="n">${cls==="done"?"✓":idx}</span>${label}</div>`};
  return `<div class="top"><span class="br">Agora</span><span class="sl">/</span><span class="pg">Creator Builder</span><span class="sp"></span><button class="sv">保存草稿</button><span class="av">林</span></div>
  <div class="steps"><div class="stp done"><span class="n">✓</span>导入</div><div class="ln"></div>
    ${st("anchor","锚定",2)}<div class="ln"></div>${st("panel","面板",3)}<div class="ln"></div>${st("pkg","打包",4)}<div class="ln"></div>
    <div class="stp ${v==="published"?"act":""}"><span class="n">5</span>发布</div></div>
  <div class="wrap">${body}</div>`;
}

async function boot(){
  if(!ID){document.getElementById("app").innerHTML='<div class="spin" style="padding-top:120px">缺少 ?id= 参数,请从导入页进入。</div>';return}
  const d=await api("/api/draft",{id:ID});
  if(d.error){document.getElementById("app").innerHTML='<div class="spin" style="padding-top:120px">草稿失败:'+esc(d.error)+'</div>';return}
  S.cands=d.candidates||[]; S.metrics=d.metrics; (d.default_selected||[]).forEach(t=>S.sel.add(t));
  renderAnchor();
}

/* ---------- ② 锚定 ---------- */
function confBadge(c){return c==="high"?'<span class="b high">高置信</span>':c==="med"?'<span class="b med">中</span>':'<span class="b low">低</span>'}
function scopeChips(s){return [s.language,s.domain,s.input_type,s.scale].filter(x=>x&&x!=="未知").map(x=>`<span class="chip">${esc(x)}</span>`).join("")}
function card(c){
  const on=S.sel.has(c.tempId),open=S.open.has(c.tempId),s=c.scope||{},coh=c.scope_coherence??1;
  const warn=coh<0.5?'<span class="b warn">⚠ 语境较杂·建议拆分</span>':'';
  const ev=(c.evidence||[]).map(e=>`<div class="evrow"><span class="d">${esc((e.date||"").slice(5))}</span><span class="tag" style="background:${SRC[e.source]||'#888'}">${esc(e.source||'')}</span><span class="t">${esc(e.title||'(无标题)')}</span></div>`).join("")||'<div class="evrow"><span class="t" style="color:var(--ink40)">（手动新增，无证据）</span></div>';
  return `<div class="card ${on?'on':''}" data-id="${c.tempId}"><div class="crow">
    <div class="ck ${on?'on':''}" onclick="toggle('${c.tempId}')">${on?'✓':''}</div>
    <div class="cmain">
      <input class="cname" value="${esc(S.names[c.tempId]??c.name)}" oninput="S.names['${c.tempId}']=this.value">
      <div class="cintent">${esc(c.intent||'')}</div>
      <div class="badges">${confBadge(c.confidence)}<span class="b">来自 ${c.from_segments} 段</span><span class="b">可复用 ${c.reusability?.overall??0}</span>${warn}</div>
      <div class="scope">验证于: ${scopeChips(s)||'<span class="chip">未知</span>'} <span style="color:var(--ink40)">一致度 ${coh}</span></div>
      <div class="acts"><a onclick="tog('${c.tempId}')">${open?'收起':'查看'}证据 (${(c.evidence||[]).length})</a><a onclick="del('${c.tempId}')">删除·不是我</a></div>
      <div class="ev ${open?'show':''}">${ev}</div>
    </div></div></div>`;
}
function renderAnchor(){
  S.view="anchor";
  const hi=S.cands.filter(c=>c.confidence==="high"||S.sel.has(c.tempId));
  const lo=S.cands.filter(c=>!(c.confidence==="high"||S.sel.has(c.tempId)));
  document.getElementById("app").innerHTML=shell(`<div class="eyebrow">AGORA · HUMAN-ANCHORED</div>
    <h1>这些是你反复在做的事，对吗？</h1>
    <div class="lede">我们读了你的历史、归纳出能力、算了每个的适用范围。<b>你只需点头、改名、或删掉不是你的。</b></div>
    <div class="bar"><span>📚 <b>${S.metrics?.observations??'?'}</b> 段精读</span><span>🎯 <b>${S.cands.length}</b> 候选</span><span>✓ 已选 <b id="seln">${S.sel.size}</b></span><span style="margin-left:auto;font-size:11px;color:var(--ink40)">${S.metrics?.cost?'$'+S.metrics.cost:''}</span></div>
    <div class="sec">高置信 · 默认已勾</div>${hi.map(card).join("")||'<div style="color:var(--ink40);font-size:13px">（暂无高置信）</div>'}
    <div class="sec">可能还有 · 你来定</div>${lo.map(card).join("")}
    <div class="addbtn" onclick="addCap()">＋ 你漏了一个？手动新增能力</div>
    <div class="foot"><div class="in"><span class="s">勾选的将成为你的能力锚点，可随时再调。</span><button class="btn ghost" onclick="location.reload()">重生成</button><button class="btn" id="done" ${S.sel.size===0?'disabled':''} onclick="finish()">完成锚定 (${S.sel.size}) →</button></div>`);
}
function toggle(id){S.sel.has(id)?S.sel.delete(id):S.sel.add(id);const c=document.querySelector(`[data-id="${id}"]`);const on=S.sel.has(id);c.classList.toggle("on",on);c.querySelector(".ck").classList.toggle("on",on);c.querySelector(".ck").textContent=on?'✓':'';const n=document.getElementById("seln");if(n)n.textContent=S.sel.size;const b=document.getElementById("done");if(b){b.textContent=`完成锚定 (${S.sel.size}) →`;b.disabled=S.sel.size===0}}
function tog(id){S.open.has(id)?S.open.delete(id):S.open.add(id);renderAnchor()}
function del(id){S.cands=S.cands.filter(c=>c.tempId!==id);S.sel.delete(id);renderAnchor()}
function addCap(){const name=prompt("能力名（你常做、但上面没列的）");if(!name)return;const tempId="u"+Date.now();S.cands.unshift({tempId,name,intent:"(手动新增)",confidence:"med",reusability:{overall:0},from_segments:0,evidence:[],scope:{},scope_coherence:1,_manual:true});S.sel.add(tempId);renderAnchor()}

async function finish(){
  const b=document.getElementById("done");b.disabled=true;b.textContent="锚定中…";
  const ops=[];
  for(const id of S.sel){const c=S.cands.find(x=>x.tempId===id);if(!c)continue;c._manual?ops.push({type:"add",name:S.names[id]??c.name,intent:c.intent}):ops.push({type:"confirm",tempId:id})}
  const r=await api("/api/anchor",{id:ID,ops});
  const created=(r.created||[]).filter(x=>x&&typeof x==="object");
  // 按 origin_temp_id 改名(不靠重名匹配,避免改错对象)
  for(const c of S.cands){if(!S.sel.has(c.tempId)||c._manual)continue;const nn=S.names[c.tempId];if(nn&&nn!==c.name){const a=created.find(x=>x.origin_temp_id===c.tempId);if(a)await api("/api/anchor-op",{id:ID,op:{type:"rename",capId:a.id,name:nn}})}}
  await renderPanel();
}

/* ---------- ③ 能力面板(下一步) ---------- */
async function renderPanel(){
  S.view="panel";
  S.anchors=(await api("/api/anchors?id="+ID)).anchors||S.anchors||[];   // 每次拉新,反映打包态(manifest_id)
  const rows=S.anchors.map((c,i)=>{
    const packaged=!!c.manifest_id;
    const cta=packaged?`<button class="btn ghost cta" onclick="openPkg('${c.id}')">查看 mini-app</button>`:`<button class="btn cta" onclick="openPkg('${c.id}')">打包成 mini-app →</button>`;
    return `<div class="pcard"><div class="dot" style="background:${CATS[i%CATS.length]}">${esc((c.name||'?').slice(0,1))}</div>
      <div class="cmain"><div style="display:flex;gap:8px;align-items:center"><b>${esc(c.name)}</b><span class="b ok">✓已锚定 · ${(c.evidence||[]).length} 段</span><span class="b ${packaged?'ok':''}">${packaged?'已打包':'未打包'}</span></div>
        <div class="cintent">${esc(c.intent||'')}</div>
        <div class="scope">适用: ${scopeChips(c.scope||{})||'<span class="chip">未知</span>'}</div></div>
      ${cta}</div>`;
  }).join("");
  document.getElementById("app").innerHTML=shell(`<div class="eyebrow">AGORA · HUMAN-ANCHORED</div>
    <h1>✓ 锚定完成 · 你的 ${S.anchors.length} 个能力</h1>
    <div class="lede">这些成了你的能力锚点。挑一个直接打包成 mini-app 拿去卖——消费者付费用，你被动收益。</div>
    <div class="banner">🔄 <b>新会话会自动归类到这些锚点</b>：以后你每做一次类似的事，证据会自动累加到对应能力，置信度持续变高——锚点越用越准。</div>
    ${rows}
    <div class="foot"><div class="in"><span class="s">每个能力都可打包成独立 mini-app 发布到市集。</span><button class="btn ghost" onclick="renderAnchor()">← 回锚定</button></div></div>`);
}

/* ---------- ④ 打包 ---------- */
async function openPkg(capId){
  S.view="pkg";
  document.getElementById("app").innerHTML=shell(`<div class="spin">正在生成运行规范<span class="dots"><i></i><i></i><i></i></span></div>`);
  const r=await api("/api/package",{id:ID,capId},90000);
  if(r.error){document.getElementById("app").innerHTML=shell('<div class="spin">打包失败:'+esc(r.error)+'<br><a onclick="renderPanel()" style="color:var(--rust);cursor:pointer">← 返回面板</a></div>');return}
  S.pkg={capId,...r}; renderPkg();
}
function renderPkg(){
  const anchor=S.anchors.find(c=>c.id===S.pkg.capId)||{};
  const slots=S.pkg.required_context||[]; const qs=S.pkg.spec?.questions||[];
  const qhtml=qs.map((q,i)=>`<div class="q"><div class="qt">${esc(q)}</div><div class="qm"><span class="b">text</span>${i===0?'<span class="b" style="background:#f7ece9;color:var(--err)">必填</span>':''}<span class="kbd">${esc(slots[i]||('answer'+i))}</span></div></div>`).join("");
  const out=S.pkg.spec?.output_spec||"产物";
  const bounds=S.pkg.scope_boundaries||[];
  const ok=bounds.filter(b=>!b.startsWith("不适用")).map(b=>`<li>✛ ${esc(b.replace(/^适用于[:：]/,''))}</li>`).join("");
  const no=bounds.filter(b=>b.startsWith("不适用")).map(b=>`<li>– ${esc(b.replace(/^不适用[:：]/,''))}</li>`).join("")||'<li style="color:var(--ink40)">（创作者未声明排除项）</li>';
  document.getElementById("app").innerHTML=shell(`<div style="font-size:12px;color:var(--ink40);margin-bottom:8px;cursor:pointer" onclick="renderPanel()">← 返回能力面板</div>
    <div class="eyebrow">打包能力 · ${esc(anchor.name||'')}</div>
    <h1>这个 mini-app 会怎么跑？</h1>
    <div class="lede">这是从你的「${esc(anchor.name||'')}」能力生成的运行规范。消费者会被问哪些问题、拿到什么产物、它声明只在什么范围内有效——确认后即可发布。</div>
    <div class="panel"><div class="plabel">QUESTIONS · <span class="muted">消费者会被问的 · 开始前向用户收集的输入槽</span></div>${qhtml||'<div style="color:var(--ink40);font-size:13px">无</div>'}</div>
    <div class="panel"><div class="plabel">OUTPUT_SPEC · <span class="muted">产物规范 · 用户会拿到的东西</span></div><div class="q"><div class="qt">${esc(out)}</div></div></div>
    <div class="panel"><div class="plabel">SCOPE BOUNDARIES · <span class="muted">适用范围边界 · 发布后展示给消费者</span></div>
      <div class="lede" style="font-size:13px;margin-bottom:10px">根据你的历史，这能力在以下范围内被反复验证有效。诚实声明边界，让消费者信任、也避免超范围误用。</div>
      <div class="cols"><div class="col ok"><h4>✓ 验证有效</h4><ul>${ok}</ul></div><div class="col no"><h4>✗ 超出范围</h4><ul>${no}</ul></div></div>
      <div style="font-size:12px;color:var(--ink40);margin-top:10px">置信依据: 来自 ${(anchor.evidence||[]).length} 段真实历史 · 范围一致度 ${anchor.scope_coherence??'—'}</div></div>
    <div class="foot"><div class="in"><span class="s">发布后将出现在市集，消费者可付费试用。</span><button class="btn ghost" onclick="renderPanel()">取消</button><button class="btn" id="pub" onclick="publish()">发布 mini-app →</button></div>`);
}
async function publish(){
  const b=document.getElementById("pub");b.disabled=true;b.textContent="发布中…";
  const r=await api("/api/eval",{id:ID},90000).catch(()=>({}));   // 先 auto-eval 试跑(可选)
  const p=await api("/api/publish",{id:ID,capId:S.pkg.capId,scope:"market"});   // 按能力发布
  if(p.error){b.disabled=false;b.textContent="重试发布";return}
  const anchor=S.anchors.find(c=>c.id===S.pkg.capId)||{}; anchor.manifest_id=anchor.id;
  S.view="published";
  document.getElementById("app").innerHTML=shell(`<div class="done"><div class="eyebrow">已发布</div><h2>🎉 「${esc(anchor.name||'')}」已上市集</h2>
    <div class="lede">消费者现在可以打开这个 mini-app、填入问题、付费试用。</div>
    <a class="link" href="${esc(p.link)}" target="_blank">${location.origin}${esc(p.link)}</a>
    <div style="margin-top:24px"><button class="btn ghost" onclick="renderPanel()">← 回能力面板，继续打包别的</button></div></div>`);
}
boot();
</script></body></html>
