# CD：部署到 tecent2 的单机 k3s（2026-07-17 起从 docker compose 切换，割接记录见 issue #86）。两个入口：
#   自动 —— main 上的 CI 成功完成后触发（workflow_run；此时三镜像已推送完成，无竞态）。
#   手动 —— workflow_dispatch，只允许选择通过同一提交完整 CI 且包含第一方认证迁移的兼容 ref。
#
# 前置约定：
#   镜像由 CI 在 main push 时构建并推送 GHCR（tag = 完整 commit SHA），本 workflow 只拉不建。
#   服务器上有固定部署目录 /opt/combo：infra/ 放 k8s 清单与各服务配置（由本 workflow 每次同步覆盖），
#   其中 .env 是唯一不同步的文件（密钥只存在服务器上，不进 git 也不进 Actions）。
#   集群侧长期凭据（combo-env / ghcr-pull 两个 Secret）在集群里，不经过本 workflow。
#   compose 编排文件保留在仓库与服务器上仅作灾难取证，不允许回滚到第一方认证切换前镜像。
#
# 所需 Secrets：
#   DEPLOY_SSH_KEY —— 专用部署私钥（对应公钥在服务器 authorized_keys）
#   DEPLOY_HOST / DEPLOY_USER —— 服务器地址与登录用户（仓库 public，不在 yml 里明文写）
name: CD

on:
  # main 的 CI 全绿后自动部署（CI 里镜像 job 成功 = 三镜像已在 GHCR）。
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 要部署的兼容 git ref。解析后的提交必须已通过同 SHA 完整 CI 并发布镜像。
        required: true
        default: main

# 同一时间只允许一个部署在跑；后触发的排队而不是取消前一个（部署中途被杀会留半成品栈）。
concurrency:
  group: cd-tecent2
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to tecent2
    # 自动路径只在 CI 成功时放行（workflow_run 对 failure 也会触发事件，这里挡掉）；手动路径无条件。
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          # 自动路径部署触发它的那次 CI 对应的提交；手动路径按输入 ref。
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.ref }}

      - name: 解析部署 SHA
        id: rev
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: 拒绝第一方认证切换前的不兼容 ref
        run: |
          test -f db/migrations/0004_first_party_email_auth.sql
          test -f db/migrations/0005_application_database_roles.sql
          grep -Fq "url: '/auth/email/challenges'" apps/authoring/src/modules/account/routes.ts
          grep -Fq "url: '/auth/email/verifications'" apps/authoring/src/modules/account/routes.ts
          grep -Fq "url: '/auth/logout'" apps/authoring/src/modules/account/routes.ts
          grep -Fq "url: '/me'" apps/authoring/src/modules/account/routes.ts
          # 在源码中拼接遗留栈模式，既执行兼容门禁，也避免静态遗留词本身污染仓库验收。
          legacy_auth_pattern='LOG'"TO_|/auth/(log"'in|callback|refresh)|dev'"-login|cb_"'refresh|cb_auth_'"tx|session"'Refresh'
          if rg -n "$legacy_auth_pattern" apps packages infra scripts; then
            echo 'ref 不满足第一方认证兼容下限，拒绝部署'
            exit 1
          fi

      - name: 手动部署必须匹配同 SHA 的完整成功 CI
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_SHA: ${{ steps.rev.outputs.sha }}
        run: |
          count="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f head_sha="$DEPLOY_SHA" -f status=completed \
            --jq '[.workflow_runs[] | select(.conclusion == "success")] | length')"
          test "$count" -gt 0 || {
            echo '该 SHA 没有完整成功的 CI 运行，拒绝手动部署'
            exit 1
          }

      # 镜像不存在就提前失败（比如 ref 指了还没跑完 CI 的提交），绝不带着缺镜像去动线上栈。
      - name: 校验三镜像已在 GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for img in combo-api combo-runtime combo-web; do
            docker manifest inspect "ghcr.io/dangdang-tech/${img}:${{ steps.rev.outputs.sha }}" > /dev/null \
              || { echo "缺镜像 ${img}:${{ steps.rev.outputs.sha }}——等 CI 的 image job 跑完再部署"; exit 1; }
          done

      - name: 配置 SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          {
            echo "Host deploy-target"
            echo "  HostName $DEPLOY_HOST"
            echo "  User $DEPLOY_USER"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  StrictHostKeyChecking yes"
          } >> ~/.ssh/config

      # 部署清单以仓库为准整目录镜像同步（k8s 清单、observability values、留作回滚的 compose 配置都在其中），
      # 唯独 .env 不碰：密钥只活在服务器上。
      - name: 同步部署清单到服务器
        run: |
          rsync -az --delete --exclude='.env' infra/ deploy-target:/opt/combo/infra/
          rsync -az scripts/smoke.sh scripts/deploy-k8s.sh deploy-target:/opt/combo/scripts/

      # 镜像由集群内 ghcr-pull Secret 拉取，服务器上不再需要 docker login。
      - name: k8s 停机式部署（预检、停旧业务、迁移、再启动新业务）
        env:
          SHA: ${{ steps.rev.outputs.sha }}
        run: |
          ssh deploy-target env SHA="$SHA" bash /opt/combo/scripts/deploy-k8s.sh

      # 割接后 web 走 NodePort 30080（系统 nginx 反代到这里）；冒烟不调用邮件供应商，
      # 只验证健康、第一方会话匿名边界和 authoring/runtime 同源反代。
      - name: 冒烟验证
        run: |
          ssh deploy-target '
            set -euo pipefail
            API_BASE=http://localhost:30080 WEB_BASE=http://localhost:30080 \
              bash /opt/combo/scripts/smoke.sh
          '

      - name: 部署结果
        run: echo "已部署 ${{ steps.rev.outputs.sha }}（触发方式 = ${{ github.event_name }}${{ inputs.ref && format('，ref = {0}', inputs.ref) || '' }}）到 tecent2 并通过冒烟。"
