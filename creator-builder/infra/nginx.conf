# nginx：静态前端 + /api 反代到 api 进程 + SSE 透传（关闭缓冲 + 长连接，脊柱 §5.1 / 技术方案 §6.1）。本期只写不跑。
# upstream 名 = compose 服务名 api，监听 3000。
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 请求体上限：浏览器直传 B-20 的 presign 是「每文件一片」的 parts[] 元数据 JSON。导入 .codex / .claude
  #   整目录（成百上千个 session 文件）时这份元数据会超过 nginx 默认 1MB → 413（用户实测 .codex 目录命中）。
  #   原文字节是直传对象存储（MinIO，不经本 nginx），故这里只需容纳元数据——放宽到 32m，与 api Fastify bodyLimit 对齐。
  client_max_body_size 32m;

  # SPA：未命中静态文件回退 index.html（前端路由 react-router）
  location / {
    try_files $uri $uri/ /index.html;
  }

  # SSE 端点：关代理缓冲、关 cache、长读超时、HTTP/1.1 长连接（脊柱 §5.1）。
  # 匹配 /api/v1/jobs/{id}/events 与 /api/v1/versions/{id}/structure/events（本期两个 SSE 流）。
  location ~ ^/api/v1/(jobs|versions)/.+/events$ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
    # 兼容部分中间层缓冲（nginx 自定义头，告知不缓冲）
    add_header X-Accel-Buffering no;
  }

  # 普通 API 反代（同源 Cookie 会话透传，§11.C）
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 基础设施探针（不在 /api/v1 前缀，脊柱 §10）
  location ~ ^/(health|ready)$ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
  }
}
