apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  labels:
    app: migrate
spec:
  # 迁移必须由单个 Job 执行，不得放进业务副本的 initContainer 并发执行。
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: migrate
          image: ghcr.io/dangdang-tech/combo-api:latest
          command: ['node', '--experimental-strip-types', 'db/scripts/migrate.ts']
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: '5432'
            - name: PGUSER
              valueFrom:
                secretKeyRef: { name: combo-env, key: POSTGRES_USER }
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: { name: combo-env, key: POSTGRES_PASSWORD }
            - name: PGDATABASE
              valueFrom:
                secretKeyRef: { name: combo-env, key: POSTGRES_DB }
            - name: POSTGRES_API_PASSWORD
              valueFrom:
                secretKeyRef: { name: combo-env, key: POSTGRES_API_PASSWORD }
            - name: POSTGRES_WORKER_PASSWORD
              valueFrom:
                secretKeyRef: { name: combo-env, key: POSTGRES_WORKER_PASSWORD }
            - name: POSTGRES_RUNTIME_PASSWORD
              valueFrom:
                secretKeyRef: { name: combo-env, key: POSTGRES_RUNTIME_PASSWORD }
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 512Mi
