apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-queue
spec:
  template:
    spec:
      containers:
        - name: redis
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 384Mi
          volumeMounts:
            - name: combo-preview-redis-queue-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: combo-preview-redis-queue-data
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
