apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
spec:
  template:
    spec:
      containers:
        - name: minio-init
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: combo-preview-env
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: combo-preview-env
                  key: S3_SECRET_KEY
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
