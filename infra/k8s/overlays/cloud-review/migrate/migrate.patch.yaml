apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
spec:
  template:
    spec:
      imagePullSecrets:
        - $patch: replace
        - name: combo-preview-ghcr-pull
      containers:
        - name: migrate
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: combo-preview-env
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: combo-preview-env
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: combo-preview-env
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
