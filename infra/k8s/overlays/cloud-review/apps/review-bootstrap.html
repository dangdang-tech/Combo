<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Combo Cloud Review · 开始体验</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f5f2eb;
        color: #171613;
      }
      main {
        width: min(420px, calc(100vw - 48px));
        padding: 36px;
        border: 1px solid #d8d1c5;
        border-radius: 18px;
        background: #fbfaf7;
        box-shadow: 0 24px 70px rgb(55 45 30 / 10%);
      }
      p {
        color: #69645b;
        line-height: 1.65;
      }
      button {
        width: 100%;
        margin-top: 16px;
        padding: 13px 18px;
        border: 0;
        border-radius: 10px;
        background: #b65338;
        color: white;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }
      #status {
        min-height: 1.5em;
        font-size: 14px;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #11110f;
          color: #f0ede6;
        }
        main {
          background: #181714;
          border-color: #37342e;
        }
        p {
          color: #aaa398;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <small>COMBO · CLOUD REVIEW</small>
      <h1>开始云端体验</h1>
      <p>这里使用独立的预览数据与临时测试身份，不会连接或修改生产环境。</p>
      <button id="start" type="button">进入测试页面</button>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script>
      const button = document.querySelector('#start');
      const status = document.querySelector('#status');
      const requested = new URLSearchParams(location.search).get('returnTo');
      const returnTo =
        requested && requested.startsWith('/') && !requested.startsWith('//') ? requested : '/';
      button.addEventListener('click', async () => {
        button.disabled = true;
        status.textContent = '正在准备独立测试身份…';
        try {
          const response = await fetch('/api/v1/auth/dev-login', {
            method: 'POST',
            credentials: 'include',
            headers: { 'content-type': 'application/json' },
            body: '{}',
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          status.textContent = '准备完成，正在进入…';
          location.replace(returnTo);
        } catch (error) {
          status.textContent = `暂时无法创建测试身份（${error.message}），请联系维护者。`;
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
