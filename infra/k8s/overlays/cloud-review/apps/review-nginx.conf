server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cloud Review 全站需要独立 Basic Auth。dev-login 只在这道保护后作为 bootstrap 使用。
  auth_basic "Combo Cloud Review";
  auth_basic_user_file /etc/nginx/review-auth/.htpasswd;

  resolver ${NGINX_RESOLVER} ipv6=off valid=10s;
  set $api_host ${API_UPSTREAM_HOST};
  set $runtime_host ${RUNTIME_UPSTREAM_HOST};
  client_max_body_size 32m;

  # 仅供 Kubernetes readiness 使用；不暴露应用状态或凭据。
  location = /__review/healthz {
    auth_basic off;
    access_log off;
    default_type text/plain;
    return 200 'ok';
  }

  # 显式、受保护的种子登录入口；不会在产品页面自动触发。
  location = /__review/bootstrap {
    try_files /__review/bootstrap.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~ ^/api/v1/(tasks|jobs|versions)/.+/events$ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
    add_header X-Accel-Buffering no;
  }

  location ^~ /api/v1/runtime/ {
    proxy_pass http://$runtime_host:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
    add_header X-Accel-Buffering no;
  }

  location ^~ /try/ {
    alias /usr/share/nginx/try/;
    try_files $uri $uri/ /try/index.html;
  }

  # 本机导入助手不能携带 Review Basic Auth。这里只放行自身已有 pairing code / PairAuth
  # 的脚本、二进制与上传通道；网页侧创建配对码、状态查询仍继承全站 Basic Auth。
  # 同时兼容当前 /connect 与产品分支迁移后的 /import/connect 路径。
  location ~ ^/api/v1/(?:import/)?connect/script$ {
    auth_basic off;
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  location ~ ^/api/v1/(?:import/)?connect/bin/ {
    auth_basic off;
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  location ~ ^/api/v1/(?:import/)?connect/upload$ {
    auth_basic off;
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    client_body_timeout 600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_request_buffering on;
  }

  location ~ ^/api/v1/connect/(prepare|upload)$ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    client_body_timeout 600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_request_buffering on;
  }

  location /api/ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  location ~ ^/(health|ready)$ {
    proxy_pass http://$api_host:3000;
    proxy_set_header Host $host;
  }
}
