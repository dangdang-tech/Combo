apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: api
          image: ghcr.io/dangdang-tech/combo-api:latest
          envFrom:
            - secretRef:
                name: combo-env
          env:
            - name: PROCESS
              value: api
            - name: NODE_ENV
              value: production
            - name: DEV_LOGIN_ENABLED
              value: 'false'
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '3000'
            - name: REDIS_QUEUE_URL
              value: redis://redis-queue:6379/0
            - name: REDIS_HOT_URL
              value: redis://redis-hot:6379/0
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_REGION
              value: us-east-1
            # 观测：OTLP 指向 observability 命名空间的采集器（HTTP 4318），缺失时应用自动降级不阻塞。
            - name: OTEL_SERVICE_NAME
              value: cb-authoring-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=k8s
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: combo-env, key: POSTGRES_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: combo-env, key: POSTGRES_PASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: combo-env, key: POSTGRES_DB }
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          # readiness 必须访问会检查全部依赖的 /ready，不能照抄 compose 的 /health。
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 1Gi
