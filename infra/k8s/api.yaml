apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: api
          image: ghcr.io/dangdang-tech/combo-api:latest
          env:
            - name: PROCESS
              value: api
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '3000'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: combo-env, key: API_DATABASE_URL }
            - name: REDIS_QUEUE_URL
              value: redis://redis-queue:6379/0
            - name: REDIS_HOT_URL
              value: redis://redis-hot:6379/0
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_PUBLIC_ENDPOINT
              valueFrom:
                secretKeyRef: { name: combo-env, key: S3_PUBLIC_ENDPOINT }
            - name: S3_REGION
              value: us-east-1
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: combo-env, key: S3_ACCESS_KEY }
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: combo-env, key: S3_SECRET_KEY }
            # 第一方认证写入只在 authoring API。生产基址固定为官方 HTTPS 地址。
            - name: PUBLIC_APP_ORIGIN
              valueFrom:
                secretKeyRef: { name: combo-env, key: PUBLIC_APP_ORIGIN }
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef: { name: combo-env, key: RESEND_API_KEY }
            - name: RESEND_FROM_EMAIL
              valueFrom:
                secretKeyRef: { name: combo-env, key: RESEND_FROM_EMAIL }
            - name: RESEND_API_BASE_URL
              value: https://api.resend.com
            - name: OTP_HMAC_SECRET
              valueFrom:
                secretKeyRef: { name: combo-env, key: OTP_HMAC_SECRET }
            # 观测：OTLP 指向 observability 命名空间的采集器（HTTP 4318），缺失时应用自动降级不阻塞。
            - name: OTEL_SERVICE_NAME
              value: cb-authoring-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=k8s
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: combo-env, key: ANTHROPIC_API_KEY, optional: true }
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef: { name: combo-env, key: LLM_PROVIDER, optional: true }
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef: { name: combo-env, key: OPENROUTER_API_KEY, optional: true }
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef: { name: combo-env, key: LLM_BASE_URL, optional: true }
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef: { name: combo-env, key: LLM_MODEL, optional: true }
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          # readiness 必须访问会检查全部依赖的 /ready，不能照抄 compose 的 /health。
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 1Gi
