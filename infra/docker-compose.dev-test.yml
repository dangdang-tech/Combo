# 仅供本地开发和端到端测试的覆盖层。生产 Compose 与 Kubernetes 清单不会加载本文件。
# 它把 authoring 的 Resend 基址指向容器内测试替身，并只把检查端口绑定到宿主回环地址。
services:
  resend-mock:
    build:
      context: ..
      dockerfile: infra/Dockerfile.resend-mock
    environment:
      RESEND_MOCK_API_KEY: ${RESEND_MOCK_API_KEY:?RESEND_MOCK_API_KEY 仅测试时必填}
      HOST: 0.0.0.0
      PORT: '4010'
    ports:
      - '127.0.0.1:${RESEND_MOCK_PORT:-4010}:4010'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://127.0.0.1:4010/health").then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))',
        ]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    restart: 'no'

  api:
    depends_on:
      resend-mock:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PUBLIC_APP_ORIGIN: ${PUBLIC_APP_ORIGIN:?PUBLIC_APP_ORIGIN 仅测试时必填}
      RESEND_API_KEY: ${RESEND_MOCK_API_KEY:?RESEND_MOCK_API_KEY 仅测试时必填}
      RESEND_FROM_EMAIL: ${RESEND_MOCK_FROM_EMAIL:-login@example.test}
      RESEND_API_BASE_URL: http://resend-mock:4010
      OTP_HMAC_SECRET: ${OTP_HMAC_SECRET:?OTP_HMAC_SECRET 仅测试时必填}
      OTEL_SDK_DISABLED: 'true'

  runtime:
    environment:
      NODE_ENV: development
      PUBLIC_APP_ORIGIN: ${PUBLIC_APP_ORIGIN:?PUBLIC_APP_ORIGIN 仅测试时必填}
      REDIS_URL: redis://redis_queue:6379
      OTEL_SDK_DISABLED: 'true'

  worker:
    environment:
      NODE_ENV: development
      OTEL_SDK_DISABLED: 'true'
