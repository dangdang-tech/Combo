# 本地与单机生产共用的全栈编排。固定启动顺序是基础设施、建桶、业务迁移和业务容器。
# PostgreSQL 保存第一方邮箱身份、验证码摘要和不透明会话摘要。邮件供应商不进入 readiness，
# 因此 Resend 故障只阻塞新验证码，不影响已有会话访问 authoring 或 runtime。
#
# 本文件只引用真实 Resend 配置，不包含测试收件箱。仅本地测试替身位于 docker-compose.dev-test.yml。
# 生产密钥使用 `${VAR:?...}` 强制显式配置；非密钥端口可由隔离测试覆盖，默认保持本机开发端口。
services:
  # ───────────────────────── 数据与中间件 ──────────────────────────
  postgres:
    image: postgres:16
    environment:
      # 密钥/连接身份必填（Codex#13）：未设即中止启动，绝不默认 combo:combo。
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER 必填（生产禁默认）}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必填（生产禁默认）}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB 必填（生产禁默认）}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:?} -d ${POSTGRES_DB:?}']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis_queue:
    image: redis:7
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-queue.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_queue_data:/data # AOF 落盘，队列绝不丢（noeviction）
    ports:
      - '127.0.0.1:${REDIS_QUEUE_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  redis_hot:
    image: redis:7
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-hot.conf:/usr/local/etc/redis/redis.conf:ro
      # 热态实例可驱逐、无须持久化（事件 Streams/锁/限流），故不挂数据卷
    ports:
      - '127.0.0.1:${REDIS_HOT_PORT:-6380}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      # 对象存储密钥必填（Codex#13）：未设即中止，绝不默认 minioadmin。
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY 必填（生产禁默认）}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY 必填（生产禁默认）}
    ports:
      - '127.0.0.1:${MINIO_API_PORT:-9000}:9000'
      - '127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 10

  # 一次性容器：建四桶（combo-raw/artifacts/exports/experience，70 §8.2）。minio healthy 后跑、跑完退。幂等。
  minio_mc:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ['/bin/sh', '/scripts/init-buckets.sh']
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY 必填（生产禁默认）}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY 必填（生产禁默认）}
    volumes:
      - ./minio/init-buckets.sh:/scripts/init-buckets.sh:ro
    restart: 'no'

  # ───────────────────────── Observability（Trace ID 排障：Grafana + Loki + Tempo + OTel Collector）─────────────────────────
  loki:
    image: grafana/loki:3.5.0
    command: ['-config.file=/etc/loki/loki.yml']
    ports:
      - '127.0.0.1:${LOKI_PORT:-3100}:3100'
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3100/ready >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

  tempo:
    image: grafana/tempo:2.9.0
    command: ['-config.file=/etc/tempo/tempo.yml']
    ports:
      - '127.0.0.1:${TEMPO_PORT:-3200}:3200'
    volumes:
      - ./observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    healthcheck:
      # tempo 镜像无 /bin/sh（只有 busybox），CMD-SHELL 形式必失败——用 exec 形式直接调 wget。
      # ingester 就绪后还有固定 15 秒等待期才返回 ready，start_period 放宽到 30 秒。
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3200/ready']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.135.0
    command: ['--config=/etc/otelcol/config.yml']
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    ports:
      - '127.0.0.1:${OTEL_GRPC_PORT:-4317}:4317'
      - '127.0.0.1:${OTEL_HTTP_PORT:-4318}:4318'
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol/config.yml:ro
      # 本地自托管日志入口：tail Docker JSON stdout/stderr，保留应用 JSON 日志里的 traceId/trace_id/span_id。
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    # 不设 healthcheck：collector 镜像是 distroless（无 shell、无 wget/curl），容器内探活无从谈起；
    # 就绪门槛由 depends_on（loki/tempo healthy）承担，collector 自身故障靠上游应用的导出报错与重启策略兜底。
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.1
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD 必填（生产禁默认）}
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - '127.0.0.1:${GRAFANA_PORT:-3003}:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

  # ───────────────────────── 业务迁移 ──────────────────────────
  # 业务迁移包含第一方认证表，并且只在 PostgreSQL 健康后由单个容器执行。
  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: '5432'
      PGUSER: ${POSTGRES_USER:?POSTGRES_USER 必填}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必填}
      PGDATABASE: ${POSTGRES_DB:?POSTGRES_DB 必填}
      POSTGRES_API_PASSWORD: ${POSTGRES_API_PASSWORD:?POSTGRES_API_PASSWORD 必填}
      POSTGRES_WORKER_PASSWORD: ${POSTGRES_WORKER_PASSWORD:?POSTGRES_WORKER_PASSWORD 必填}
      POSTGRES_RUNTIME_PASSWORD: ${POSTGRES_RUNTIME_PASSWORD:?POSTGRES_RUNTIME_PASSWORD 必填}
    # 同镜像、覆盖入口跑迁移（runner 在镜像内 db/scripts/migrate.ts）
    entrypoint: ['node', '--experimental-strip-types', 'db/scripts/migrate.ts']
    restart: 'no'

  # ───────────────────────── 业务进程（同镜像四入口 + web nginx）─────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis_queue:
        condition: service_healthy
      redis_hot:
        condition: service_healthy
      minio:
        condition: service_healthy
      # 建桶一次性容器跑完才起 api（api 预签名上传前四桶必须存在）。这条依赖同时让
      # `up --wait` 知道 minio_mc 是「应当退出」的一次性服务——没有任何依赖方声明时，
      # --wait 会把它的正常退出（exit 0）误判为失败。
      minio_mc:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOST: 0.0.0.0
      PROCESS: api
      DATABASE_URL: postgres://combo_api:${POSTGRES_API_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      REDIS_QUEUE_URL: redis://redis_queue:6379/0
      REDIS_HOT_URL: redis://redis_hot:6379/0
      S3_ENDPOINT: http://minio:9000
      # 浏览器直传专用公网端点（BUG-013）：API 内网走 minio:9000，但浏览器拿到的 presigned URL 必须宿主可达。
      #   dev 默认 http://localhost:9000（minio 已 publish 9000）；生产设为对外 S3/CDN 公网端点。仅 API 服务需要（唯一 presign 方）。
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      # 只有 authoring API 消费邮件与验证码密钥。生产基址被应用启动校验固定为官方 HTTPS 地址。
      PUBLIC_APP_ORIGIN: ${PUBLIC_APP_ORIGIN:?PUBLIC_APP_ORIGIN 必填}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY 必填（生产禁默认）}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:?RESEND_FROM_EMAIL 必填}
      RESEND_API_BASE_URL: ${RESEND_API_BASE_URL:-https://api.resend.com}
      OTP_HMAC_SECRET: ${OTP_HMAC_SECRET:?OTP_HMAC_SECRET 必填（至少三十二字符）}
      # LLM key 例外：上游 degraded 不计 /ready，缺失只降级不阻塞启动，故保留空默认（与 env.ts 一致）。
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # LLM provider 选择 + OpenRouter（OpenAI 兼容）接线：同 degraded 语义，全部允许空（缺则降级不阻塞）。
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      OTEL_SERVICE_NAME: cb-authoring-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=compose
    ports:
      - '127.0.0.1:${API_PORT:-3000}:3000'
    healthcheck:
      # liveness：/health 轻量、不查依赖（依赖就绪由 /ready 自查，编排/LB 据 /ready 判定接流量）
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:3000/health\").then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    # OOM 护栏：api 也接收/缓冲上传体，给内存上限 + 崩溃自动重启（与 worker 同策略）。
    mem_limit: 1g
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    depends_on:
      redis_queue:
        condition: service_healthy
      redis_hot:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PROCESS: worker
      # OOM 护栏：限制 V8 老生代堆，配合容器 mem_limit 让内存超限时容器内优雅 OOM 而非拖垮宿主。
      NODE_OPTIONS: --max-old-space-size=1536
      DATABASE_URL: postgres://combo_worker:${POSTGRES_WORKER_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      REDIS_QUEUE_URL: redis://redis_queue:6379/0
      REDIS_HOT_URL: redis://redis_hot:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      OTEL_SERVICE_NAME: cb-authoring-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=compose
    # OOM 护栏：worker 硬内存上限 + 崩溃自动重启。超限时是容器内可恢复的 OOM
    # （任务失败 → 自动重启 → 开机 reconcile 重排失联任务），而非无上限撑爆 Docker VM /
    # 拖垮宿主（曾致整机冻结 + 队列永久卡死）。
    mem_limit: 2g
    mem_reservation: 1g
    restart: unless-stopped

  # runtime 只读第一方认证会话，并承载试用端业务接口。
  runtime:
    build:
      context: ..
      dockerfile: infra/Dockerfile.runtime
    depends_on:
      redis_queue:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: '3100'
      HOST: 0.0.0.0
      DATABASE_URL: postgres://combo_runtime:${POSTGRES_RUNTIME_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      REDIS_URL: redis://redis_queue:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      PUBLIC_APP_ORIGIN: ${PUBLIC_APP_ORIGIN:?PUBLIC_APP_ORIGIN 必填}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      RUNTIME_LLM_PROVIDER: ${RUNTIME_LLM_PROVIDER:-}
      RUNTIME_LLM_MODEL: ${RUNTIME_LLM_MODEL:-anthropic/claude-sonnet-4.6}
      OTEL_SERVICE_NAME: cb-runtime-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=compose
    expose:
      - '3100'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3100/health\").then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
      runtime:
        condition: service_healthy
    ports:
      - '127.0.0.1:${WEB_PORT:-80}:80'
    healthcheck:
      # 用 127.0.0.1 而非 localhost：容器内 busybox wget 会先解析 localhost→::1(IPv6)，
      # 而 nginx 默认只 listen IPv4 0.0.0.0:80 → IPv6 连接被拒、健康检查误判 unhealthy(host 侧服务实为正常)。
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  pgdata:
  redis_queue_data:
  miniodata:
  loki_data:
  tempo_data:
  grafana_data:
