<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agora · 你的 mini-app 桌面</title>
<style>
:root{
  --paper:#FBF9F4; --ink:#14141A; --accent:#D14A24; --accent-soft:rgba(209,74,36,.10);
  --line:#E7E0D3; --raised:#fff; --mut:#6b6457; --ink-08:rgba(20,20,26,.08);
  --font-display:"Noto Serif SC","Instrument Serif",serif; --font-mono:"Geist Mono",ui-monospace,monospace;
  --sb:280px;
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:"Noto Sans SC",system-ui,sans-serif;background:var(--paper);color:var(--ink);
  display:grid;grid-template-columns:var(--sb) 1fr;height:100vh;overflow:hidden}
/* ───── 左侧常驻侧边栏 ───── */
.sidebar{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:#FCFAF5}
.sb-identity{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
.id-avatar{width:34px;height:34px;border-radius:9px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:var(--font-display);font-size:16px;flex:none}
.id-text{flex:1;min-width:0}.id-name{font-weight:600;font-size:14px}.id-sub{font-size:11.5px;color:var(--mut)}
.id-action{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--mut);font-size:17px;line-height:1;cursor:pointer}.id-action:hover{border-color:var(--accent);color:var(--accent)}
.sb-search{padding:10px 14px}
.sb-input{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:9px;padding:7px 10px;color:var(--mut);font-size:12.5px;background:#fff;cursor:text}
.sb-input .kbd{margin-left:auto;font-family:var(--font-mono);font-size:10px;border:1px solid var(--line);border-radius:5px;padding:0 5px;color:var(--mut)}
.sb-scroll{flex:1;overflow:auto;padding:4px 8px 16px}
.nav-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--ink);text-decoration:none;font-size:13.5px;cursor:pointer}
.nav-row:hover{background:var(--ink-08)}.nav-row.is-active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.nav-row .ic{width:16px;text-align:center;opacity:.7;font-size:13px}
.nav-row .badge{margin-left:auto;font-family:var(--font-mono);font-size:9.5px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:0 6px}
.sb-sec{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--mut);text-transform:uppercase;padding:14px 12px 6px}
.app-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;text-decoration:none;color:inherit}
.app-row:hover{background:var(--ink-08)}.app-row.is-active{background:var(--accent-soft)}
.app-row.is-active .av{border-color:var(--accent)}
.av{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;font-family:var(--font-display);font-size:14px;flex:none}
.app-meta{flex:1;min-width:0}.app-nm{font-size:13px;font-weight:600;line-height:1.2}.app-sub{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stance-switch{display:flex;gap:4px;margin:2px 0 4px 50px}
.stance-switch button{font:inherit;font-size:11px;border:1px solid var(--line);background:#fff;color:var(--mut);border-radius:999px;padding:2px 9px;cursor:pointer}
.stance-switch button.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.sb-foot{padding:10px 14px;border-top:1px solid var(--line);font-size:11px;color:var(--mut)}
/* ───── 主区:当前 mini-app ───── */
.main{min-width:0;min-height:0;display:flex;flex-direction:column}
.main-bar{height:42px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 16px;background:#FCFAF5}
.main-bar .crumb{font-size:13px;color:var(--mut)}.main-bar .crumb b{color:var(--ink)}
.main-bar .pill{font-family:var(--font-mono);font-size:10.5px;color:var(--accent);border:1px solid var(--accent);border-radius:999px;padding:1px 8px}
.main-bar .sp{flex:1}
.main-bar a.ext{font-size:12px;color:var(--mut);text-decoration:none}.main-bar a.ext:hover{color:var(--accent)}
.frame-wrap{flex:1;min-height:0;position:relative}
iframe{width:100%;height:100%;border:0;display:block;background:var(--paper)}
@media(max-width:760px){body{grid-template-columns:1fr}.sidebar{display:none}}
</style></head><body>

<aside class="sidebar">
  <div class="sb-identity">
    <div class="id-avatar">你</div>
    <div class="id-text"><div class="id-name">你</div><div class="id-sub">你的 mini-app 桌面</div></div>
    <button class="id-action" title="贡献 / 新建" onclick="toast('贡献入口:请求 / 上架 / 新建工作流 / 发广场')">+</button>
  </div>
  <div class="sb-search"><div class="sb-input" onclick="toast('搜索 mini-app(demo)')"><span>🔍</span><span>搜索 mini-app…</span><span class="kbd">⌘K</span></div></div>
  <div class="sb-scroll">
    <a class="nav-row is-active" data-nav="home"><span class="ic">⌂</span><span>首页</span></a>
    <a class="nav-row" onclick="toast('Marketplace · Feed/检索/货架(demo)')"><span class="ic">▦</span><span>市场 Marketplace</span><span class="badge">128</span></a>
    <a class="nav-row" onclick="toast('创作者中心:上传你的会话历史→提取经验体→上架(demo)')"><span class="ic">✦</span><span>创作者中心</span><span class="badge">Ship</span></a>
    <a class="nav-row" onclick="toast('Academy(demo)')"><span class="ic">◷</span><span>学院 Academy</span></a>

    <div class="sb-sec">我的 mini-app</div>
    <!-- 老周·职业:同一份经验,两种 stance(换皮) -->
    <a class="app-row" id="app-career" data-app="career" onclick="openApp('career')">
      <div class="av">周</div>
      <div class="app-meta"><div class="app-nm">老周 · 职业取舍</div><div class="app-sub">offer/跳槽的判断力</div></div>
    </a>
    <div class="stance-switch" data-for="career">
      <button data-stance="advisor" class="on" onclick="event.stopPropagation();openApp('career','advisor')">问他</button>
      <button data-stance="collab" onclick="event.stopPropagation();openApp('career','collab')">陪我做</button>
    </div>
    <!-- 林姐·合同红线 -->
    <a class="app-row" id="app-redliner" data-app="redliner" onclick="openApp('redliner')">
      <div class="av">林</div>
      <div class="app-meta"><div class="app-nm">林姐 · 合同红线</div><div class="app-sub">term sheet 逐条审红线</div></div>
    </a>
    <!-- 老周·从真实 session 提取出来的版本 -->
    <a class="app-row" id="app-extracted" data-app="extracted" onclick="openApp('extracted')">
      <div class="av">⌥</div>
      <div class="app-meta"><div class="app-nm">老周 · 提取版</div><div class="app-sub">从真实 session 自动提取</div></div>
    </a>
  </div>
  <div class="sb-foot">同一引擎驱动全部 · stance 决定怎么暴露同一份经验</div>
</aside>

<section class="main">
  <div class="main-bar">
    <span class="crumb">我的 mini-app · <b id="crumbName">老周 · 职业取舍</b></span>
    <span class="pill" id="crumbStance">advisor</span>
    <span class="sp"></span>
    <a class="ext" id="extLink" href="#" target="_blank">在新标签打开 ↗</a>
  </div>
  <div class="frame-wrap"><iframe id="frame" title="mini-app"></iframe></div>
</section>

<div id="toast" style="position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50"></div>

<script>
const $=s=>document.querySelector(s);
// 每个 app → 它的 url(embed=1 让 mini-app 隐藏自己的整页顶栏,自适应主区)
const APPS={
  career:{ name:"老周 · 职业取舍", stances:{
    advisor:{url:"/advisor.html?embed=1", pill:"advisor · 被问"},
    collab: {url:"/collab.html?embed=1",  pill:"collaborator · 陪做"} } },
  redliner:{ name:"林姐 · 合同红线", stances:{ collab:{url:"/redliner.html?embed=1", pill:"collaborator · 红线"} } },
  extracted:{ name:"老周 · 提取版", stances:{ collab:{url:"/collab.html?embed=1&exp=extracted", pill:"collaborator · 提取经验"} } },
};
let cur={app:"career",stance:"advisor"};
function openApp(app, stance){
  const a=APPS[app]; if(!a) return;
  if(!stance) stance = (app===cur.app)? cur.stance : Object.keys(a.stances)[0];
  if(!a.stances[stance]) stance=Object.keys(a.stances)[0];
  cur={app,stance};
  const s=a.stances[stance];
  $("#frame").src=s.url;
  $("#crumbName").textContent=a.name;
  $("#crumbStance").textContent=s.pill;
  $("#extLink").href=s.url.replace("embed=1","").replace(/[?&]$/,"")||s.url;
  // 高亮
  document.querySelectorAll(".app-row").forEach(r=>r.classList.toggle("is-active",r.dataset.app===app));
  document.querySelectorAll('.stance-switch[data-for="career"] button').forEach(b=>b.classList.toggle("on",app==="career"&&b.dataset.stance===stance));
}
let tT;function toast(m){const t=$("#toast");t.textContent=m;t.style.opacity=1;clearTimeout(tT);tT=setTimeout(()=>t.style.opacity=0,2200);}
openApp("career","advisor");
</script>
</body></html>
